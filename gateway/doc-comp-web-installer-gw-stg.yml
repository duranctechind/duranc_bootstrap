# doc-comp-web-installer-gw-stg-fixed.yml
# Ensures /app/output/gateway-bundle exists & is writable before the web app starts.
# Usage:
#   export HOST_UID=$(id -u); export HOST_GID=$(id -g)
#   COMPOSE_PROJECT_NAME=duranc_installer_ui docker compose -f doc-comp-web-installer-gw-stg-fixed.yml up -d
#
services:
  mkdirs:
    image: busybox:latest
    command: >
      sh -c "mkdir -p /host/output/gateway-bundle /host/tmp
      && chmod -R 0775 /host
      && chown -R ${HOST_UID}:${HOST_GID} /host"
    volumes:
      - /opt/duranc/installer-web:/host
    restart: "no"

  web:
    image: index.docker.io/durancai/staging-installer-web-gw:latest
    # If you use a different image tag, change it here.
    depends_on:
      mkdirs:
        condition: service_completed_successfully
    environment:
      HOST_UID: "${HOST_UID}"
      HOST_GID: "${HOST_GID}"
    user: "${HOST_UID}:${HOST_GID}"
    ports:
      - "5080:5080"
    volumes:
      - /opt/duranc/installer-web/output:/app/output
      - /opt/duranc/installer-web/tmp:/app/tmp
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import os,sys; os.makedirs("/app/output/gateway-bundle", exist_ok=True); print("ok")'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
